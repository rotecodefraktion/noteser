name: CI

# Runs on every push to main (to catch direct-to-main mistakes) and on
# every PR (the gate we'll require once we move to branch-per-feature).
# See docs/release-process.md for the full workflow plan.

on:
  # Validate every push to main (catches direct-to-main mistakes — still
  # legal but should be red if something broke) AND to dev (the staging
  # branch that auto-deploys to Vercel preview).
  push:
    branches: [main, dev]
  # Validate PRs targeting either main or dev. Branch protection on main
  # is not enforceable without GitHub Pro on private repos, so this is
  # the practical gate — read the CI badge before merging.
  pull_request:
    branches: [main, dev]

# Cancel in-flight runs when a newer commit lands on the same ref. Saves
# CI minutes on noisy push streaks.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    # Matches the version pinned in package.json's engines.node.
    env:
      NODE_VERSION: '22'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Run each check separately so the GitHub PR summary shows which
      # step failed. They could be parallelised across jobs, but for a
      # codebase this size the cost-of-coordination > the wall-clock win.
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --ci

      - name: Build
        run: npm run build

      # Fail the build on a known high/critical advisory in the dependency
      # tree. Moderate-and-below are surfaced but not blocking (--audit-level
      # high) so a transitive low-severity advisory can't wedge every PR.
      - name: Audit dependencies
        run: npm audit --audit-level=high

  collab-server:
    name: Collab server (typecheck · test · audit)
    runs-on: ubuntu-latest
    # Separate package with its own lockfile (Cloudflare Workers), so it
    # needs its own install + audit — the root `npm ci`/`npm audit` above
    # never sees these dependencies.
    defaults:
      run:
        working-directory: collab-server
    env:
      NODE_VERSION: '22'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: collab-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=high

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '22'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Only Chromium is configured in playwright.config.ts, so install just
      # that browser (plus its system libs) to keep the job fast.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # e2e:ci boots `npm run dev` itself (Playwright webServer) and waits for
      # http://localhost:3001, so there is no separate "start server" step. It
      # runs the STABLE top-level specs only (playwright.config.ci.ts excludes
      # the experimental e2e/parity/** specs); the e2e:sync live-GitHub script
      # stays a manual gate.
      - name: Run E2E tests
        run: npm run e2e:ci

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
